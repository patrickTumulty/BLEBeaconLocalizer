<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>

    <div class="centered">
        <button onclick="showPage('chart-view-container')">Main Graphs</button>
        <button onclick="showPage('details')">Details</button>
        <button onclick="showPage('points')">Points</button>
    </div>

    <div id="chart-view-container" class="page active centered">
        <div id="chart-view">
        </div>
    </div>

    <div id="details" class="page">
        <h2>Details</h2>
        <p>Other data goes here...</p>
    </div>

    <div id="points" class="page">
        <div class="point" style="left: 100px; top: 100px;">A</div>
        <div class="point" style="left: 300px; top: 200px;">B</div>
        <div class="point" style="left: 200px; top: 400px;">C</div>
    </div>

    <script type="module" src="src/js/index.js"></script>
</body>

</html>
